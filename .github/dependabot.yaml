version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees: ["atqamz"]
    groups:
      flake-inputs:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees: ["atqamz"]
    groups:
      actions:
        patterns: ["*"]
